name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Astroblock.sln

      - name: Coordinate authority guard
        run: scripts/check-coords-authority.sh

      - name: Test
        run: dotnet test Astroblock.sln --configuration Release --no-restore
